name: Cofre Digital - Deploy Automatizado
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: cofre-digital-app

jobs:
  build:
    name: Construir Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # --- Fluxo real com Docker Hub (comentado para fins didáticos) ---
      # - name: Build da imagem Docker
      #   run: |
      #     docker build -t cofre-digital:latest -f docker/Dockerfile .
      #
      # - name: Login no Docker Hub
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #
      # - name: Push da imagem para o Docker Hub
      #   run: |
      #     docker tag cofre-digital:latest ${{ secrets.DOCKER_USERNAME }}/cofre-digital:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/cofre-digital:latest

      # --- Versão simplificada para simulação ---
      - name: Build da imagem (sem push)
        run: |
          echo "Construindo imagem localmente..."
          echo "Imagem: $IMAGE_NAME"
          echo "Build concluído (simulação)."

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Simular deploy Staging
        run: |
          echo "Iniciando deploy STAGING..."
          echo "DB_HOST=${{ secrets.STAGING_DB_HOST }}" >> staging.env
          echo "DB_USER=${{ secrets.STAGING_DB_USER }}" >> staging.env
          echo "DB_PASSWORD=***MASKED***" >> staging.env
          echo "EXTERNAL_API_KEY=***MASKED***" >> staging.env
          echo "ENVIRONMENT=staging" >> staging.env
          cat staging.env

  deploy-production:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simular deploy Produção
        run: |
          echo "Iniciando deploy PRODUÇÃO..."
          echo "DB_HOST=${{ secrets.PROD_DB_HOST }}" >> production.env
          echo "DB_USER=${{ secrets.PROD_DB_USER }}" >> production.env
          echo "DB_PASSWORD=***MASKED***" >> production.env
          echo "EXTERNAL_API_KEY=***MASKED***" >> production.env
          echo "ENVIRONMENT=production" >> production.env
          cat production.env

  security-check:
    name: Verificação de Segurança
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Verificar vazamentos de secrets
        run: |
          echo "Verificando se há secrets expostos..."
          if grep -r "password.*=" app/ --exclude-dir=.git; then
            echo "ATENÇÃO: senha hardcoded encontrada!"
            exit 1
          fi
          if grep -r "api.*key.*=" app/ --exclude-dir=.git; then
            echo "ATENÇÃO: API key hardcoded encontrada!"
            exit 1
          fi
          echo "Nenhum secret exposto encontrado!"
