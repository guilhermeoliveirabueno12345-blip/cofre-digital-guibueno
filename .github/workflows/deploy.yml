# ============================================================
#  WORKFLOW DE DEPLOY — COFRE DIGITAL
#  Este arquivo explica, passo a passo, o que cada parte faz.
#  Use como guia de estudo para entender o pipeline.
# ============================================================

name: Deploy Cofre Digital

on:
  push:
    branches:
      - main

jobs:

  # ============================================================
  # JOB 1 — BUILD + DEPLOY SIMULADO
  # ============================================================
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # Passo 1 — Baixar o código do repositório
      # --------------------------------------------------------
      - name: Checkout código
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Passo 2 — Instalar o Python
      # --------------------------------------------------------
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --------------------------------------------------------
      # Passo 3 — Instalar dependências
      # --------------------------------------------------------
      - name: Instalar dependências
        run: |
          pip install -r app/requirements.txt

      # --------------------------------------------------------
      # Passo 4 — Construir a imagem Docker (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Build da imagem Docker
      #   run: |
      #     docker build -t cofre-digital:latest -f docker/Dockerfile .

      # --------------------------------------------------------
      # SIMULAÇÃO DO BUILD
      # --------------------------------------------------------
      - name: Simulação do Build da Imagem Docker
        run: |
          echo "🛠️ SIMULAÇÃO: Construindo imagem Docker..."
          echo "➡️ O build REAL está comentado para fins didáticos."
          echo "✔️ Build simulado concluído!"

      # --------------------------------------------------------
      # Passo 5 — Login no Docker Hub (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Login no Docker Hub
      #   run: |
      #     echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      # --------------------------------------------------------
      # SIMULAÇÃO DO LOGIN
      # --------------------------------------------------------
      - name: Simulação do Login no Docker Hub
        run: |
          echo "🔐 SIMULAÇÃO: Realizando login no Docker Hub..."
          echo "➡️ Secrets reais NÃO estão sendo usados."
          echo "✔️ Login simulado com sucesso!"

      # --------------------------------------------------------
      # Passo 6 — Push da imagem (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Push da imagem para o Docker Hub
      #   run: |
      #     docker tag cofre-digital:latest ${{ secrets.DOCKER_USERNAME }}/cofre-digital:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/cofre-digital:latest

      # --------------------------------------------------------
      # SIMULAÇÃO DO PUSH
      # --------------------------------------------------------
      - name: Simulação do Push da Imagem
        run: |
          echo "📦 SIMULAÇÃO: Enviando imagem para o Docker Hub..."
          echo "➡️ Nenhuma imagem REAL está sendo enviada."
          echo "✔️ Push simulado concluído!"

      # --------------------------------------------------------
      # Passo 7 — Deploy em STAGING (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Deploy em Staging
      #   if: github.ref == 'refs/heads/main'
      #   env:
      #     DB_HOST: ${{ secrets.STAGING_DB_HOST }}
      #     DB_USER: ${{ secrets.STAGING_DB_USER }}
      #     DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      #     API_KEY: ${{ secrets.STAGING_API_KEY }}
      #   run: |
      #     echo "Deploy em ambiente de STAGING com segurança"

      # --------------------------------------------------------
      # SIMULAÇÃO DO DEPLOY EM STAGING
      # --------------------------------------------------------
      - name: Simulação do Deploy em Staging
        run: |
          echo "🚀 SIMULAÇÃO: Deploy em STAGING..."
          echo "➡️ Secrets reais NÃO estão sendo usados."
          echo "✔️ Deploy simulado em STAGING concluído!"

      # --------------------------------------------------------
      # Passo 8 — Deploy em PRODUÇÃO (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Deploy em Produção
      #   if: github.ref == 'refs/heads/main'
      #   env:
      #     DB_HOST: ${{ secrets.PROD_DB_HOST }}
      #     DB_USER: ${{ secrets.PROD_DB_USER }}
      #     DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      #     API_KEY: ${{ secrets.PROD_API_KEY }}
      #   run: |
      #     echo "Deploy em ambiente de PRODUÇÃO com segurança"

      # --------------------------------------------------------
      # SIMULAÇÃO DO DEPLOY EM PRODUÇÃO
      # --------------------------------------------------------
      - name: Simulação do Deploy em Produção
        run: |
          echo "🚀 SIMULAÇÃO: Deploy em PRODUÇÃO..."
          echo "➡️ Nenhum secret real está sendo utilizado."
          echo "✔️ Deploy simulado em PRODUÇÃO concluído!"

      # --------------------------------------------------------
      # Passo 9 — Verificação de Segurança (REAL — COMENTADO)
      # --------------------------------------------------------
      # - name: Verificação REAL de Segurança
      #   run: |
      #     trivy image cofre-digital:latest

      # --------------------------------------------------------
      # SIMULAÇÃO DA VERIFICAÇÃO DE SEGURANÇA
      # --------------------------------------------------------
      - name: Simulação da Verificação de Segurança
        run: |
          echo "🔍 SIMULAÇÃO: Verificando vulnerabilidades..."
          echo "➡️ Ferramentas reais como Trivy NÃO estão sendo executadas."
          echo "➡️ Simulando análise de dependências..."
          echo "✔️ Nenhuma vulnerabilidade crítica encontrada (simulado)."

  # ============================================================
  # JOB 2 — TESTES SIMULADOS (test_local.sh)
  # ============================================================
  test-simulation:
    name: 🧪 Testes Simulados
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar test_local.sh
        run: bash tests/test_local.sh

  # ============================================================
  # JOB 3 — TESTES INTERATIVOS (modo automático)
  # ============================================================
  interactive-tests:
    name: 🎮 Testes Interativos (Automático)
    runs-on: ubuntu-latest
    needs: test-simulation

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # O script interativo espera input humano.
      # Para rodar no Actions, enviamos a opção "6" automaticamente.
      - name: Executar interactive_tests.sh (modo automático)
        run: bash tests/interactive_tests.sh <<< "6"
